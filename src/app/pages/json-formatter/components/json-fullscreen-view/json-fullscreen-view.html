<app-fullscreen-overlay [open]="open()" (closed)="closed.emit()">
  <div class="fs-header">
    <div class="fs-header__title">
      <span class="fs-header__dot" aria-hidden="true"></span>
      output.json
      @if (mode() === 'pretty') {
        <div class="fs-header__tree-actions">
          <button type="button" appButton="ghost" size="sm" (click)="expandAll.emit()">Expand All</button>
          <button type="button" appButton="ghost" size="sm" (click)="collapseAll.emit()">Collapse All</button>
        </div>
      }
    </div>
    <div class="fs-header__actions">
      <button
        type="button"
        class="tool-btn tool-btn--accent"
        [class.tool-btn--done]="jsonCopied()"
        (click)="copy.emit()"
        [attr.title]="jsonCopied() ? 'Copied!' : 'Copy output'"
        [attr.aria-label]="jsonCopied() ? 'Copied!' : 'Copy output'"
      >
        @if (jsonCopied()) {
          <app-icon name="check" [size]="15" [strokeWidth]="2.5" />
        } @else {
          <app-icon name="copy" [size]="15" />
        }
      </button>
      <button type="button" class="tool-btn tool-btn--success" (click)="download.emit()" title="Download JSON" aria-label="Download JSON">
        <app-icon name="download" [size]="15" />
      </button>
      <button type="button" class="tool-btn tool-btn--teal" (click)="closed.emit()" title="Minimize (Esc)" aria-label="Minimize (Esc)">
        <app-icon name="minimize" [size]="15" [strokeWidth]="2.2" />
      </button>
    </div>
  </div>

  <div class="fs-body">
    @if (showManualPrompt()) {
      <div class="fs-body__overlay">
        <button type="button" appButton="primary" (click)="manualFormat.emit()">Format JSON →</button>
      </div>
    } @else if (showInvalidBadge()) {
      <div class="fs-body__error" role="alert">Syntax error: {{ jsonError() }}</div>
    } @else {
      @switch (mode()) {
        @case ('pretty') {
          <app-json-tree-view [rows]="treeRows()" (togglePath)="togglePath.emit($event)" />
        }
        @case ('minify') {
          <app-json-flat-view [rows]="flatRows()" />
        }
        @case ('tree') {
          <app-json-worktree-view [rows]="worktreeRows()" />
        }
      }
    }
  </div>
</app-fullscreen-overlay>
