<div class="toolbar">
  <app-segmented-control [options]="modeOptions" [value]="outputMode()" (valueChange)="onModeChange($event)" ariaLabel="Output mode" />

  <button type="button" appButton="toggle" size="xs" [active]="autoFormat()" (click)="toggleAuto.emit()" class="auto-toggle" [attr.aria-pressed]="autoFormat()">
    <span class="auto-toggle__dot" aria-hidden="true"></span>Auto
  </button>

  @if (isTreeMode()) {
    <div class="expand-group" role="group" aria-label="Tree expansion">
      <button type="button" class="expand-btn" (click)="expandAll.emit()">Expand All</button>
      <button type="button" class="expand-btn" (click)="collapseAll.emit()">Collapse All</button>
    </div>
  }

  <div class="toolbar__spacer"></div>

  @if (showValidBadge()) {
    <span class="status status--valid" role="status">
      <app-icon name="check" [size]="12" color="var(--success)" [strokeWidth]="3" />
      Valid JSON
    </span>
  }
  @if (showInvalidBadge()) {
    <span class="status status--invalid" role="alert">✗ {{ jsonError() }}</span>
  }

  <label
    for="json-upload-input"
    class="tool-btn tool-btn--blue"
    tabindex="0"
    title="Upload JSON file"
    aria-label="Upload JSON file"
    (keydown.enter)="uploadInput.click()"
    (keydown.space)="uploadInput.click(); $event.preventDefault()"
  >
    <app-icon name="upload" [size]="15" />
  </label>
  <input #uploadInput id="json-upload-input" type="file" accept="application/json,.json,.txt" (change)="onFileSelected($event)" class="visually-hidden" />

  <app-json-history-dropdown [items]="historyItems()" [open]="historyOpen()" (toggleOpen)="toggleHistory.emit()" (select)="selectHistory.emit($event)" />

  <button
    type="button"
    class="tool-btn tool-btn--accent"
    [class.tool-btn--done]="jsonCopied()"
    (click)="copy.emit()"
    [attr.title]="jsonCopied() ? 'Copied!' : 'Copy output'"
    [attr.aria-label]="jsonCopied() ? 'Copied!' : 'Copy output'"
  >
    @if (jsonCopied()) {
      <app-icon name="check" [size]="15" [strokeWidth]="2.5" />
    } @else {
      <app-icon name="copy" [size]="15" />
    }
  </button>
  <button type="button" class="tool-btn tool-btn--success" (click)="download.emit()" title="Download JSON" aria-label="Download JSON">
    <app-icon name="download" [size]="15" />
  </button>
  <button type="button" class="tool-btn tool-btn--danger" (click)="clear.emit()" title="Clear" aria-label="Clear">
    <app-icon name="trash" [size]="15" />
  </button>
  <button type="button" class="tool-btn tool-btn--teal" (click)="openFullscreen.emit()" title="Fullscreen" aria-label="Fullscreen">
    <app-icon name="fullscreen" [size]="15" />
  </button>
</div>
