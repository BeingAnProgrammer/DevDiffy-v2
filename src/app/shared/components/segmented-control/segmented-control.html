<div class="segmented" role="group" [attr.aria-label]="ariaLabel()">
  @for (option of options(); track option.value) {
    <button
      type="button"
      appButton="toggle"
      size="xs"
      [active]="option.value === value()"
      [attr.aria-pressed]="option.value === value()"
      (click)="select(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
